<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: head('songs')}"></head>
  <body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

    <h1>Best Songs</h1>
    <th:block th:each="song : ${songs}">
      <div th:object="${song}">
        <h2 th:text="|Canzone *{id}  : *{toString()}|"></h2>

        <div>[[*{averageVote}]]</div>
      </div>
    </th:block>
  </body>
</html>
