<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Movies</title>
    <th:block th:replace="~{fragments/linkHead :: linkHead}" />
  </head>
  <body>
    <h1>Best Movies</h1>
    <th:block th:each="movie : ${movies}">
      <div th:object="${movie}">
        <h2 th:text="*{toString()}"></h2>
      </div>
    </th:block>
  </body>
</html>
