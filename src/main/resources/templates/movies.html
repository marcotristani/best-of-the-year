<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: head('movies')}"></head>
  <body>
    <h1>Best Movies</h1>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

    <th:block th:each="movie : ${movies}">
      <div th:object="${movie}">
        <h2 th:text="*{toString()}"></h2>
      </div>
    </th:block>
  </body>
</html>
